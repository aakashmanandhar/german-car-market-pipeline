steps:
  - id: 'terraform-validate'
    name: 'hashicorp/terraform:1.15.8'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform
        terraform init -backend=false
        terraform fmt -check
        terraform validate

  - id: 'dbt-parse'
    name: 'python:3.12-slim'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        pip install dbt-bigquery==1.11.3 --quiet
        cd dbt
        dbt parse --no-partial-parse

options:
  logging: CLOUD_LOGGING_ONLY